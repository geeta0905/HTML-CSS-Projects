<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Basic of html  </title>
    <style>
      body {
            background-color:rgb(237, 232, 225);         
            font-family: Arial;   
            margin: 20px;                   
        } 
        main {
            padding: 20px;                      
            border: 3px solid black;           
        } 
        table {
            width: 100%;                       
            border-collapse: collapse;
            text-align: center;              
            margin-bottom: 20px;
        }
        th {
            background-color: #4CAF50;
            color: white;                       
            padding: 10px;
            font-size: 18px;                   
            letter-spacing: 1px;              
        }
        td {
            padding: 8px;
            font-size: 14px;
        }
        form {
            background-color: #f9f9f9;
            padding: 15px;
            border: 2px solid #ccc;
            text-align: center;                
        }
        input, select, textarea {
            border: 3px solid yellowgreen;
            font-size: 10px;
        }
        span {
            color: blueviolet;
            font-weight: bold;
            text-decoration: underline;
        }
        audio, video {
            border: 3px solid black;
            padding: 8px;
        }
    </style>
</head>
<body>
    <main>
        <section>
            <div>
                Student table 
    <table border="2">
        <thead>
            <tr>
                <th> Roll No </th>
                <th> Name </th>
                <th> Subject </th>
                <th> Marks </th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td> 01 </td>

            <tr> 
                <td> 03 </td>

<section> 
    <div>
    <form action="#" method="post">
       <label> Name </label>
            <input type="text" id="name" name="name" required> <br><br>

        <label> Age </label>
        <input type="number" id="Age" name="Age" min="20" max="55" required> <br> <br> 

       <label> Email </label>
       <input type="email" id="email" name="email" placeholder="avc.@gmail.com" required> <br><br> 

       <label> Password </label>
        <input type="password" id="Password" name="Password" required title="at least 6 characters "><br><br>

        <label> Gender </label>
        <input type="radio" id="Male" name="Gender" value="Male" ><label>Male </label>
        <input type="radio" id="Female" name="Gender" value="Female" ><label>Female </label><br> <br>

        <label> Skills </label>
        <input type="checkbox" id="HTML" name="Skills" value="HTML"> <label>HTML</label>
        <input type="checkbox" id="CSS" name="Skills" value="CSS"> <label>CSS</label>
        <input type="checkbox" id="JavaScript" name="Skills" value="JavaScript"> <label>JavaScript</label>
        <input type="checkbox" id="Python" name="Skills" value="Python"> <label>Python</label> <br> <br> 

        <label> City </label>
        <select id="City" name="City">
            <option value=""> Select </option>
            <option value="Kolhapur"> Kolhapur </option>
            <option value="Satara"> Satara </option>
            <option value="Mumbai"> Mumbai </option>
            <option value="Pune"> Pune </option>
        </select> <br><br>

        <label> Address </label>
        <textarea id="Address" name="Address" rows="4" cols="30"></textarea> <br> <br> 

        <button type="submit"> Submit </button>
        <button type="reset"> Reset </button>
    </form>
    <hr>
    <div style="border: 2px solid black; padding: 10px;border-left: 7px solid orange;
            background-color:rgb(236, 182, 128)"> This is a <span style="color: blueviolet;"> Geeta Patel </span></div>
